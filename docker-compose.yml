networks:
  bigdata:
    driver: bridge

volumes:
  postgres_data:
  spark_model:
  airflow_logs:

services:

  # ─────────────────────────────────────────
  # Zookeeper + Kafka
  # ─────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks: [bigdata]
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 2181 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    restart: on-failure
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks: [bigdata]
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:29092 2>/dev/null | grep -q '(id:'"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint:
      - bash
      - -c
      - >-
        kafka-topics --create --if-not-exists --bootstrap-server kafka:29092
        --replication-factor 1 --partitions 1 --topic amazon-reviews
        && echo 'Topic amazon-reviews created.'
    networks: [bigdata]
    
  # ─────────────────────────────────────────
  # Spark
  # ─────────────────────────────────────────
  spark-master:
    build: ./spark
    container_name: spark-master
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    ports:
      - "8090:8080"   # Spark UI (avoid clash with Airflow on 8080)
      - "7077:7077"
    environment:
      SPARK_NO_DAEMONIZE: "true"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: recommendations
      POSTGRES_USER: bigdata
      POSTGRES_PASSWORD: bigdata
    volumes:
      - ./spark/jobs:/jobs
      - spark_model:/model
    networks: [bigdata]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/json/ | grep -q '\"status\"'"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  spark-worker:
    build: ./spark
    container_name: spark-worker
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    depends_on:
      spark-master:
        condition: service_healthy
    environment:
      SPARK_NO_DAEMONIZE: "true"
      SPARK_WORKER_MEMORY: 2g
      SPARK_WORKER_CORES: "2"
    volumes:
      - ./spark/jobs:/jobs
      - spark_model:/model
    networks: [bigdata]

  # ─────────────────────────────────────────
  # Spark Streaming (always-on inference service)
  #
  # Loads the frozen ALS model once at startup and applies it to new
  # Kafka events continuously (micro-batch every 30 s).
  # Airflow's restart_streaming_service task issues `docker restart spark-stream`
  # after each training run so the service reloads the new model.
  # ─────────────────────────────────────────
  spark-stream:
    build: ./spark
    container_name: spark-stream
    depends_on:
      kafka:
        condition: service_healthy
      spark-master:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped
    command: >-
      bash -c "until [ -f /model/metrics.json ]; do echo 'Waiting for model...'; sleep 10; done &&
      /opt/spark/bin/spark-submit --master local[2]
      --packages org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.0,org.postgresql:postgresql:42.7.3
      --conf spark.sql.shuffle.partitions=10
      --conf spark.sql.streaming.kafka.useDeprecatedOffsetFetching=false
      /jobs/stream.py"
    environment:
      KAFKA_BOOTSTRAP: kafka:29092
      MODEL_PATH: /model
      PYSPARK_PYTHON: python3
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: recommendations
      POSTGRES_USER: bigdata
      POSTGRES_PASSWORD: bigdata
    volumes:
      - ./spark/jobs:/jobs
      - spark_model:/model
    networks: [bigdata]

  # ─────────────────────────────────────────
  # PostgreSQL (stores recommendations + model_runs)
  # ─────────────────────────────────────────
  postgres:
    image: postgres:15
    container_name: postgres
    environment:
      POSTGRES_USER: bigdata
      POSTGRES_PASSWORD: bigdata
      POSTGRES_DB: recommendations
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/create-airflow-db.sh:/docker-entrypoint-initdb.d/01-create-airflow-db.sh:ro
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/02-init.sql:ro
    ports:
      - "5433:5432"
    networks: [bigdata]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bigdata -d recommendations"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  # ─────────────────────────────────────────
  # Airflow — orchestrates the 4-task DAG:
  #   wait_for_kafka_messages → spark_batch_training
  #   → restart_streaming_service → print_model_metrics
  #
  # Docker socket is mounted so Airflow can issue
  # `docker restart spark-stream` in task 3.
  # ─────────────────────────────────────────
  airflow:
    build: ./airflow
    container_name: airflow
    user: "0"   # root — needed for docker socket access and model file cleanup
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      spark-master:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://bigdata:bigdata@postgres/airflow
      AIRFLOW__CORE__FERNET_KEY: ""
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
      SPARK_MASTER: spark://spark-master:7077
      KAFKA_BOOTSTRAP: kafka:29092
      KAFKA_TOPIC: amazon-reviews
      MAX_ROWS: "50000"          # used by KafkaTopicSensor threshold
      KAFKA_MIN_MSGS: "10000"    # sensor triggers training once this many msgs exist (≤ MAX_ROWS)
      PYSPARK_PYTHON: python3
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: recommendations
      POSTGRES_USER: bigdata
      POSTGRES_PASSWORD: bigdata
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock   # needed for `docker restart spark-stream`
      - ./airflow/dags:/opt/airflow/dags
      - airflow_logs:/opt/airflow/logs
      - ./spark/jobs:/jobs
      - spark_model:/model
    ports:
      - "8080:8080"
    command: >-
      bash -c "
        airflow db migrate &&
        (airflow users create --username airflow --password airflow --firstname Air --lastname Flow --role Admin --email admin@example.com || true) &&
        { airflow scheduler & exec airflow webserver; }
      "
    networks: [bigdata]

  # ─────────────────────────────────────────
  # Kafka Producer
  # Streams Reviews.csv row-by-row to the Kafka topic.
  # Exits cleanly after MAX_ROWS messages (or full dataset).
  # restart: on-failure retries if it crashes mid-stream.
  # ─────────────────────────────────────────
  producer:
    build: ./producer
    container_name: producer
    restart: on-failure
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    environment:
      KAFKA_BOOTSTRAP: kafka:29092
      KAFKA_TOPIC: amazon-reviews
      CSV_PATH: /dataset/Reviews.csv
      DELAY_MS: 10        # ms between messages (adjust speed)
      MAX_ROWS: 50000     # 0 = full dataset
    volumes:
      - ./dataset:/dataset:ro
    networks: [bigdata]

  # ─────────────────────────────────────────
  # FastAPI — serves recommendations from PostgreSQL
  # ─────────────────────────────────────────
  api:
    build: ./api
    container_name: api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_URL: postgresql://bigdata:bigdata@postgres/recommendations
    volumes:
      - spark_model:/model:ro
    ports:
      - "8000:8000"
    networks: [bigdata]

  # ─────────────────────────────────────────
  # Dashboard (Nginx + HTML/JS)
  # Serves the static SPA and reverse-proxies /api/ → FastAPI
  # ─────────────────────────────────────────
  dashboard:
    build: ./dashboard
    container_name: dashboard
    depends_on: [api]
    ports:
      - "8501:80"    # nginx serves dashboard; /api/ is reverse-proxied to FastAPI
    networks: [bigdata]
