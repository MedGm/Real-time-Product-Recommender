networks:
  bigdata:
    driver: bridge

volumes:
  postgres_data:
  spark_model:
  airflow_logs:

services:

  # ─────────────────────────────────────────
  # Zookeeper + Kafka
  # ─────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks: [bigdata]

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on: [zookeeper]
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks: [bigdata]

  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka-init
    depends_on: [kafka]
    entrypoint: >
      bash -c "
        echo 'Waiting for Kafka...' &&
        cub kafka-ready -b kafka:29092 1 60 &&
        kafka-topics --create --if-not-exists --bootstrap-server kafka:29092
          --replication-factor 1 --partitions 1 --topic amazon-reviews &&
        echo 'Topic amazon-reviews created.'
      "
    networks: [bigdata]

  # ─────────────────────────────────────────
  # Spark
  # ─────────────────────────────────────────
  spark-master:
    build: ./spark
    container_name: spark-master
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    ports:
      - "8090:8080"   # Spark UI (avoid clash with Airflow on 8080)
      - "7077:7077"
    environment:
      SPARK_NO_DAEMONIZE: "true"
    volumes:
      - ./spark/jobs:/jobs
      - ./dataset:/dataset:ro
      - spark_model:/model
    networks: [bigdata]

  spark-worker:
    build: ./spark
    container_name: spark-worker
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    depends_on: [spark-master]
    environment:
      SPARK_NO_DAEMONIZE: "true"
      SPARK_WORKER_MEMORY: 2g
      SPARK_WORKER_CORES: "2"
    volumes:
      - ./spark/jobs:/jobs
      - ./dataset:/dataset:ro
      - spark_model:/model
    networks: [bigdata]

  # ─────────────────────────────────────────
  # Spark Streaming (always-on, restarts automatically)
  # ─────────────────────────────────────────
  spark-stream:
    build: ./spark
    container_name: spark-stream
    depends_on: [spark-master, kafka, postgres]
    restart: unless-stopped
    command: >-
      bash -c "until [ -f /model/metrics.json ]; do echo 'Waiting for model...'; sleep 10; done &&
      /opt/spark/bin/spark-submit --master local[2]
      --packages org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.0,org.postgresql:postgresql:42.7.3
      --conf spark.sql.shuffle.partitions=10
      /jobs/stream.py"
    environment:
      KAFKA_BOOTSTRAP: kafka:29092
      MODEL_PATH: /model
      PYSPARK_PYTHON: python3
    volumes:
      - ./spark/jobs:/jobs
      - spark_model:/model
    networks: [bigdata]

  # ─────────────────────────────────────────
  # PostgreSQL (stores recommendations)
  # ─────────────────────────────────────────
  postgres:
    image: postgres:15
    container_name: postgres
    environment:
      POSTGRES_USER: bigdata
      POSTGRES_PASSWORD: bigdata
      POSTGRES_DB: recommendations
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/create-airflow-db.sh:/docker-entrypoint-initdb.d/01-create-airflow-db.sh:ro
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/02-init.sql:ro
    ports:
      - "5433:5432"
    networks: [bigdata]

  # ─────────────────────────────────────────
  # Airflow
  # ─────────────────────────────────────────
  airflow:
    build: ./airflow
    container_name: airflow
    user: "0"   # root — needed to clean up model files written by spark-worker
    depends_on: [postgres, kafka, spark-master]
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://bigdata:bigdata@postgres/airflow
      AIRFLOW__CORE__FERNET_KEY: ""
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
      SPARK_MASTER: spark://spark-master:7077
      KAFKA_BOOTSTRAP: kafka:29092
      PYSPARK_PYTHON: python3
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - airflow_logs:/opt/airflow/logs
      - ./spark/jobs:/jobs
      - ./dataset:/dataset:ro
      - spark_model:/model
    ports:
      - "8080:8080"
    command: >-
      bash -c "
        until python3 -c \"import psycopg2; psycopg2.connect('postgresql://bigdata:bigdata@postgres/airflow')\" 2>/dev/null; do
          echo 'Waiting for postgres...'; sleep 3;
        done &&
        airflow db init &&
        airflow users create --username airflow --password airflow --firstname Air --lastname Flow --role Admin --email admin@example.com 2>/dev/null || true &&
        airflow scheduler &
        airflow webserver"
    networks: [bigdata]

  # ─────────────────────────────────────────
  # Kafka Producer (runs once, streams CSV)
  # ─────────────────────────────────────────
  producer:
    build: ./producer
    container_name: producer
    depends_on: [kafka-init]
    environment:
      KAFKA_BOOTSTRAP: kafka:29092
      KAFKA_TOPIC: amazon-reviews
      CSV_PATH: /dataset/Reviews.csv
      DELAY_MS: 10        # ms between messages (adjust speed)
      MAX_ROWS: 50000     # 0 = full dataset
    volumes:
      - ./dataset:/dataset:ro
    networks: [bigdata]

  # ─────────────────────────────────────────
  # FastAPI
  # ─────────────────────────────────────────
  api:
    build: ./api
    container_name: api
    depends_on: [postgres]
    environment:
      DB_URL: postgresql://bigdata:bigdata@postgres/recommendations
    volumes:
      - spark_model:/model:ro
    ports:
      - "8000:8000"
    networks: [bigdata]

  # ─────────────────────────────────────────
  # Streamlit dashboard
  # ─────────────────────────────────────────
  dashboard:
    build: ./dashboard
    container_name: dashboard
    depends_on: [api]
    environment:
      API_URL: http://api:8000
    ports:
      - "8501:8501"
    networks: [bigdata]
